# Tename Alembic configuration.
#
# Migrations live inside the package at src/tename/db/migrations/ so they
# ship with the wheel on PyPI. The DB URL is read from the
# TENAME_DATABASE_URL environment variable by env.py; the empty
# sqlalchemy.url below is a placeholder.

[alembic]
script_location = src/tename/db/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =


[post_write_hooks]
# Intentionally empty. Run `make format` to lint/format new migration files.
hooks =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
